name: Tjek andelsboliger

on:
  schedule:
    # Hvert 5. minut (korteste tilladte interval; kan forsinkes under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # tillad manuel kørsel fra Actions-fanen

# Tillad at jobbet committer opdateret state tilbage til repoet.
permissions:
  contents: write

concurrency:
  # Undgå overlappende kørsler hvis én tager lang tid.
  group: andelsbolig-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Kør scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLL_PAGES: "1"
        run: python -m scraper.main

      - name: Gem state tilbage
        run: |
          git config user.name "andelsbolig-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "Ingen ændringer i state."
          else
            git commit -m "Opdater seen-state [skip ci]"
            git push
          fi
